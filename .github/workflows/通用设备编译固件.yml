#============================================================================================
# https://github.com/ophub/amlogic-s9xxx-openwrt
# Description: Build OpenWrt
# 多套配置并行：config_profile 选 lede-master / lede-master-test1 等，
# 需在仓库中建立对应目录 config/<profile>/ 并放入 config、diy-part1.sh、diy-part2.sh
#============================================================================================

name: 通用设备编译固件

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select the source branch (repo to clone)"
        required: false
        default: "lede-master"
        type: choice
        options:
          - openwrt-main
          - lede-master
          - immortalwrt-master
          - Lienol-master
      config_profile:
        description: "Config set (default = use source branch; test1/test2 = parallel test)"
        required: false
        default: "default"
        type: choice
        options:
          - default
          - lede-master-test1

env:
  FEEDS_CONF: ${{ format('config/{0}/feeds.conf.default', inputs.config_profile == 'default' && inputs.source_branch || inputs.config_profile) }}
  CONFIG_FILE: ${{ format('config/{0}/config', inputs.config_profile == 'default' && inputs.source_branch || inputs.config_profile) }}
  DIY_P1_SH: ${{ format('config/{0}/diy-part1.sh', inputs.config_profile == 'default' && inputs.source_branch || inputs.config_profile) }}
  DIY_P2_SH: ${{ format('config/{0}/diy-part2.sh', inputs.config_profile == 'default' && inputs.source_branch || inputs.config_profile) }}
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  DEVICE_NAME: ${{ inputs.config_profile == 'default' && inputs.source_branch || inputs.config_profile || 'generic' }}
  FILE_DATE: ${{ github.run_number }}
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false

jobs:
  # 仅当触发者为仓库拥有者时执行（避免 fork 或他人触发误跑）
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      # 打印当前磁盘占用，便于对比优化前后
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      # 清理系统空间：卸载 Docker/apt/npm 等缓存，保留 GCC/Clang 等编译所需
      - name: "Optimize Disk Space"
        uses: "hugoalh/disk-space-optimizer-ghaction@v0.8.1"
        with:
          operate_sudo: "True"
          general_include: ".+"
          general_exclude: |-
            ^GCC$
            ^G\+\+$
            Clang
            LLVM
          docker_include: ".+"
          docker_prune: "True"
          docker_clean: "True"
          apt_prune: "True"
          apt_clean: "True"
          homebrew_prune: "True"
          homebrew_clean: "True"
          npm_prune: "True"
          npm_clean: "True"
          os_swap: "True"

      # 进一步腾空间：移除 .NET/Android/Haskell/CodeQL/Docker 镜像等，扩大可用磁盘
      - name: Freeing up disk space
        uses: easimon/maximize-build-space@master
        with:
          # 新版 GitHub runner 上 2GB 预留会在 LVM 初始化后只剩约 100MB，apt 初始化会直接失败。
          root-reserve-mb: 12288
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 再次打印磁盘占用，确认空间已释放
      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      # 拉取当前仓库代码（含 config、diy 脚本等）
      - name: Checkout
        uses: actions/checkout@main

      # 初始化环境：安装 OpenWrt 编译依赖（is.gd 或本地包列表）、创建 workdir、设时区
      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://is.gd/depend_ubuntu2204_openwrt) || \
          sudo -E apt-get -y install build-essential gcc g++ binutils make bzip2 flex gawk gettext git gperf patch bc ccache rsync subversion unzip xz-utils file wget curl python3 python3-distutils python3-pip pkg-config libncurses-dev libncurses5-dev libncursesw5-dev zlib1g-dev libssl-dev libelf-dev liblz4-tool locales ca-certificates
          sudo -E systemctl daemon-reload
          #sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo mkdir -p /home/runner/work/build-openwrt/build-openwrt/workdir
          sudo chown ${USER}:${GROUPS} /home/runner/work/build-openwrt/build-openwrt/workdir
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      # 再次安装/确认构建依赖（与 coolsnowwolf/lede 官方 README 一致，Ubuntu 22/24）
      # 参考：https://github.com/coolsnowwolf/lede
      - name: Install build dependencies
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev \
            locales ca-certificates file xz-utils bc
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      # 根据 source_branch 选择仓库并浅克隆到 workdir/openwrt，并做符号链接到 workspace
      - name: Clone source code [ ${{ inputs.source_branch }} ]
        id: codes
        working-directory: /home/runner/work/build-openwrt/build-openwrt/workdir
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          # Set up compilation source code
          if [[ "${{ inputs.source_branch }}" == *"openwrt"* ]]; then
              REPO_URL="https://github.com/openwrt/openwrt"
              REPO_BRANCH="main"
              TAGS_NAME="official"
          elif [[ "${{ inputs.source_branch }}" == *"lede"* ]]; then
              REPO_URL="https://github.com/coolsnowwolf/lede"
              REPO_BRANCH="master"
              TAGS_NAME="lede"
          elif [[ "${{ inputs.source_branch }}" == *"immortalwrt"* ]]; then
              REPO_URL="https://github.com/immortalwrt/immortalwrt"
              REPO_BRANCH="master"
              TAGS_NAME="immortalwrt"
          elif [[ "${{ inputs.source_branch }}" == *"Lienol"* ]]; then
              REPO_URL="https://github.com/Lienol/openwrt"
              REPO_BRANCH="22.03"
              TAGS_NAME="Lienol"
          else
              echo "Unknown source code repository."
              exit 1
          fi

          # Clone source code
          git clone -q --single-branch --depth=1 --branch=${REPO_BRANCH} ${REPO_URL} openwrt
          ln -sf /home/runner/work/build-openwrt/build-openwrt/workdir/openwrt ${GITHUB_WORKSPACE}/openwrt

          # Set output information
          echo "build_tag=OpenWrt_${TAGS_NAME}_$(date +"%Y.%m")" >> ${GITHUB_OUTPUT}
          echo -e "REPO_URL: [ ${REPO_URL} ]\nREPO_BRANCH: [ ${REPO_BRANCH} ]\nTAGS_NAME: [ ${TAGS_NAME} ]"
          df -hT ${PWD}
          echo "status=success" >> ${GITHUB_OUTPUT}

      # 若存在则复制自定义 feeds.conf.default，并执行 diy-part1（feeds 更新前：改 feeds 等）
      - name: Load custom feeds
        run: |
          [[ -f "${FEEDS_CONF}" ]] && cp -f ${FEEDS_CONF} openwrt/feeds.conf.default
          chmod +x ${DIY_P1_SH}
          cd openwrt/
          ${GITHUB_WORKSPACE}/${DIY_P1_SH}

      # 从 feeds.conf.default 拉取所有 feed 源码到 feeds/
      - name: Update feeds
        run: cd openwrt/ && ./scripts/feeds update -a

      # 将 feed 中的软件包链接到 package/feeds/，供编译使用
      - name: Install feeds
        run: cd openwrt/ && ./scripts/feeds install -a

      # 修复 uwsgi 包：用 immortalwrt 的 net/uwsgi 替换，并保留 lede 的 files-luci-support，避免 nginx 报错
      # 参考：https://github.com/immortalwrt/packages (net/uwsgi)、coolsnowwolf/packages (files-luci-support)
      - name: Fix uwsgi package (immortalwrt + luci-support from feeds)
        run: |
          cd openwrt
          if [ ! -d "feeds/packages/net/uwsgi" ]; then
            echo "feeds/packages/net/uwsgi 不存在，跳过 uwsgi 修复"
            exit 0
          fi
          mkdir -p package/uwsgi && cd package/uwsgi
          git init -q
          git remote add origin https://github.com/immortalwrt/packages.git
          git config core.sparsecheckout true
          echo "net/uwsgi/*" >> .git/info/sparse-checkout
          git pull -q --depth 1 origin master
          rm -rf net/uwsgi/files-luci-support
          cd ../..
          cp -r feeds/packages/net/uwsgi/files-luci-support package/uwsgi/net/uwsgi/
          rm -rf feeds/packages/net/uwsgi/*
          mv package/uwsgi/net/uwsgi/* feeds/packages/net/uwsgi/
          rm -rf package/uwsgi
          echo "uwsgi 已替换为 immortalwrt 版本并保留 feeds 中的 files-luci-support"

      # 复制 files 目录和 .config，并执行 diy-part2（feeds 更新后：改 IP、主题、包等）
      - name: Load custom configuration
        run: |
          [[ -d "files" ]] && mv -f files openwrt/files
          [[ -e "${CONFIG_FILE}" ]] && cp -f ${CONFIG_FILE} openwrt/.config
          chmod +x ${DIY_P2_SH}
          cd openwrt/
          ${GITHUB_WORKSPACE}/${DIY_P2_SH}

      # 根据 .config 生成完整配置并下载所有需要的源码包到 dl/
      - name: Download package
        id: package
        run: |
          cd openwrt/
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      # 执行 make 编译 OpenWrt 固件；成功则输出 status=success 供后续步骤判断
      - name: Compile the OpenWrt
        id: compile
        run: |
          cd openwrt/
          echo -e "$(nproc) thread compile"
          make -j$(($(nproc) + 1)) V=s || make -j1 || make -j1 V=s
          echo "status=success" >> ${GITHUB_OUTPUT}

      # 编译失败时保留关键诊断文件，避免 GitHub 日志过期后无法追溯失败包和最终配置
      - name: Upload failure diagnostics
        uses: actions/upload-artifact@main
        if: ${{ failure() && !cancelled() }}
        with:
          name: OpenWrt_failure_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
          path: |
            openwrt/.config
            openwrt/logs
            openwrt/tmp/.config-package.in
            openwrt/tmp/.packageinfo
            openwrt/tmp/.targetinfo
          if-no-files-found: ignore
          retention-days: 14

      # 编译结束后查看磁盘占用
      - name: Check space usage
        if: ${{ !cancelled() }}
        run: df -hT

      # 通过 ServerChan3 发送编译结果（成功/失败 + 配置名 + 运行链接）；未配 secret 则跳过
      - name: Notify ServerChan3 (compile result)
        if: ${{ always() }}
        env:
          SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
          SERVERCHAN_UID: ${{ secrets.SERVERCHAN_UID }}
          SERVERCHAN3_URL: ${{ secrets.SERVERCHAN3_URL }}
        run: |
          if [ -n "$SERVERCHAN3_URL" ]; then
            PUSH_URL="$SERVERCHAN3_URL"
          else
            if [ -z "$SERVERCHAN_SCKEY" ]; then echo "SERVERCHAN_SCKEY 未配置，跳过 ServerChan3 推送"; exit 0; fi
            if [ -z "$SERVERCHAN_UID" ] && printf '%s' "$SERVERCHAN_SCKEY" | grep -Eq '^sctp[0-9]+t'; then
              SERVERCHAN_UID="$(printf '%s' "$SERVERCHAN_SCKEY" | sed -E 's/^sctp([0-9]+)t.*/\1/')"
            fi
            if [ -z "$SERVERCHAN_UID" ]; then echo "SERVERCHAN_UID 未配置且无法从 sendkey 推导，跳过 ServerChan3 推送"; exit 0; fi
            PUSH_URL="https://${SERVERCHAN_UID}.push.ft07.com/send/${SERVERCHAN_SCKEY}.send"
          fi

          STATUS="${{ steps.compile.outputs.status }}"
          if [ "$STATUS" = "success" ]; then
            TITLE="OpenWrt 编译成功"
            SHORT="配置 ${{ env.DEVICE_NAME }} 成功"
          else
            TITLE="OpenWrt 编译失败"
            SHORT="配置 ${{ env.DEVICE_NAME }} 失败"
          fi
          RUN_LINK="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DESP=$(printf '**配置**: `%s`\n\n**源码**: `%s`\n\n**结果**: %s\n\n**运行**: [#%s](%s)\n' \
            "${{ env.DEVICE_NAME }}" \
            "${{ inputs.source_branch }}" \
            "$TITLE" \
            "${{ github.run_number }}" \
            "$RUN_LINK")
          BODY=$(jq -n \
            --arg title "$TITLE" \
            --arg desp "$DESP" \
            --arg short "$SHORT" \
            '{title: $title, desp: $desp, short: $short, tags: "OpenWrt|GitHub Actions", template: "markdown"}')
          HTTP_CODE=$(curl -s -o /tmp/serverchan3-response.json -w "%{http_code}" \
            -X POST "$PUSH_URL" \
            -H "Content-Type: application/json" \
            -d "$BODY" || true)
          RESPONSE_CODE=$(jq -r '.code // .errno // empty' /tmp/serverchan3-response.json 2>/dev/null || true)
          if [ "$HTTP_CODE" = "200" ] && [ "$RESPONSE_CODE" = "0" ]; then
            echo "ServerChan3 推送已发送"
          else
            echo "ServerChan3 推送未确认成功 (HTTP ${HTTP_CODE}, code ${RESPONSE_CODE:-unknown})"
          fi

      # 编译成功时，将 openwrt/bin 打包为 Artifact 供下载
      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: ${{ steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' }}
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      # 编译成功且开启固件上传时：进入固件目录、删除 packages 子目录，并写入 FIRMWARE 路径
      - name: Organize files
        id: organize
        if: ${{ steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled() }}
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      # 将整理后的固件目录打包为 Artifact（仅整理成功时）
      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: ${{ steps.organize.outputs.status == 'success' && !cancelled() }}
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      # 编译成功且开启 Release 时：生成 release 标签和 release.txt 正文（CowTransfer/WeTransfer 需单独添加 step 后在此引用）
      - name: Generate release tag
        id: tag
        if: ${{ steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled() }}
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          [ "$UPLOAD_COWTRANSFER" = "true" ] && echo "🔗 CowTransfer 需在 workflow 中先添加上传 step" >> release.txt || true
          [ "$UPLOAD_WETRANSFER" = "true" ] && echo "🔗 WeTransfer 需在 workflow 中先添加上传 step" >> release.txt || true
          echo "status=success" >> $GITHUB_OUTPUT

      # 编译成功且 tag 已生成时：创建 GitHub Release 并上传固件目录下所有文件
      - name: Upload firmware to release
        uses: softprops/action-gh-release@v1
        if: ${{ steps.compile.outputs.status == 'success' && steps.tag.outputs.status == 'success' && !cancelled() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      # 清理旧的工作流运行记录：保留最近 3 条、其余超过 1 天的删除，Release 正文为固件说明
      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3
          token: ${{ secrets.GH_TOKEN }}
          body: |
            ### OpenWrt Image information
            - Default IP: 192.168.113.205
            - Default username: root
            - Default password: password
            - Default WIFI name: OpenWrt
            - Default WIFI password: none
            ### Install to EMMC
            - Login to OpenWrt → System → Amlogic Service → Install OpenWrt
            ### OpenWrt Image Verification
            - sha256sum
